name: Auto Release & Sync

on:
  push:
    branches:
      - master
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch: # 添加手动触发开关
    inputs:
      force_update_release_note:
        description: '是否强制更新已存在的 Release Note'
        required: false
        default: false
        type: boolean

jobs:
  release-manager:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Process Versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_UPDATE: ${{ github.event.inputs.force_update_release_note }}
        run: |
          # 1. 提取所有符合 ## [x.y.z] 格式的版本号
          ALL_VERSIONS=$(grep -oP '^## \[\K[^\]]+' CHANGELOG.md)

          for VER in $ALL_VERSIONS; do
            TAG_NAME="v$VER"
            
            # 2. 提取当前版本的内容块
            sed -n "/^## \[$VER\]/,/^## /p" CHANGELOG.md | sed '1d;$d' > current_note.md
            if [ ! -s current_note.md ]; then
                sed -n "/^## \[$VER\]/,\$p" CHANGELOG.md | sed '1d' > current_note.md
            fi

            # 3. 检查状态
            TAG_EXISTS=$(git rev-parse "$TAG_NAME" >/dev/null 2>&1 && echo "true" || echo "false")
            RELEASE_EXISTS=$(gh release view "$TAG_NAME" >/dev/null 2>&1 && echo "true" || echo "false")

            # 4. 执行逻辑
            if [ "$TAG_EXISTS" = "true" ]; then
                if [ "$RELEASE_EXISTS" = "false" ]; then
                    echo ">>> [创建] 发现 Tag $TAG_NAME 但无 Release，正在创建..."
                    gh release create "$TAG_NAME" --title "$TAG_NAME" --notes-file current_note.md
                elif [ "$FORCE_UPDATE" = "true" ]; then
                    echo ">>> [强制更新] 正在同步 $TAG_NAME 的 Release Note..."
                    gh release edit "$TAG_NAME" --notes-file current_note.md
                else
                    echo ">>> [跳过] $TAG_NAME 已存在 Release。"
                fi
            else
                echo ">>> [忽略] 未发现 Tag $TAG_NAME，请确保 Git Tag 已推送到仓库。"
            fi
          done